aid: localclarity
name: LocalClarity
description: >
  LocalClarity is an AI-driven local search management platform for enterprises,
  agencies, and global brands. It provides a REST API for managing Google Business
  Profiles, tracking local rankings, monitoring and responding to reviews across
  50+ sources, managing business listing data across Google, Apple, Bing, Facebook,
  and Waze, and automating local SEO workflows at scale.
